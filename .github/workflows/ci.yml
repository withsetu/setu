name: CI

# Baseline quality gate — typecheck + tests + Playwright E2E.
#   * On a PR: skip entirely for docs-only (markdown) changes AND while the PR is a draft
#     (#462 — the per-job `if` below; `ready_for_review` in the trigger fires the run the
#     draft skipped). Otherwise the `check` job runs only the packages changed since the
#     merge-base with the base branch AND their dependents (turbo `...[<sha>]` affected
#     filter, #271/#272), and the `e2e` job runs the PR browser lane (chromium +
#     webkit-on-editor-specs + visual snapshots, #219).
#   * On push to main + WEEKLY cron + manual dispatch: full unit suite AND the full E2E
#     browser matrix (chromium + firefox + webkit on everything). Push-to-main is the real
#     post-merge safety net; the weekly cron just catches flaky/time/dep drift. (Was nightly —
#     dropped to weekly to cut private-repo Actions minutes, #462.)
# Foundation: #217 · Affected filtering: #271 · turbo task graph: #272 · E2E: #219 ·
# CI epic: #216 · cost: #462.

on:
  pull_request:
    # ready_for_review is needed so that marking a draft PR ready fires the CI run the draft
    # skipped (the default types are opened/synchronize/reopened, which don't include it).
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch: # run the full suite + 3-browser E2E matrix on demand (e.g. before a big merge)
  schedule:
    # Weekly full-matrix safety net (Mon 03:17 UTC). Push-to-main already runs the full matrix
    # on every merge, so main is always covered; this weekly run just catches drift (#462).
    - cron: '17 3 * * 1'

# Cancel superseded runs on the same branch/PR so only the latest commit is checked.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck + test
    runs-on: ubuntu-latest
    # Skip while the PR is a draft (#462 — saves the expensive run until it's ready). Non-PR
    # events (push/schedule/workflow_dispatch) have no `pull_request` context, so the first
    # clause keeps them running; only a draft PR is skipped.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the affected filter can diff against the base branch.
          fetch-depth: 0

      # pnpm must be installed before setup-node so its `cache: pnpm` can find the store.
      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Turbo remote cache backed by GitHub's own Actions cache (#273): the adapter runs
      # a localhost server speaking Turbo's cache API and sets TURBO_API/TOKEN/TEAM, so
      # every `turbo run` below gets CROSS-RUN cache hits on fresh runners. No external
      # service, no secrets, no owner provisioning; GitHub LRU-evicts old entries (10GB).
      # Correctness: cache keys are turbo's content hashes (see turbo.json — hash-audited,
      # kill-shot-proven in #272); changed code always misses and executes. Upgrade path
      # if we outgrow GitHub's cache: this same action supports `provider: s3` (R2).
      # Pinned by commit SHA (third-party action, supply-chain hygiene — #281 posture).
      - name: Turbo remote cache (GitHub Actions cache)
        uses: rharkor/caching-for-turbo@75f8ebf4a43d2c60b23bc2a27082cfea94ffdad9 # v2.5.0

      # PR: derive a since-SHA (merge-base with the base branch) and a scope mode.
      #   - docs-only (all changed files are *.md/*.mdx) -> skip typecheck/test.
      #   - otherwise -> affected: turbo `...[<sha>]` (changed packages + dependents,
      #     resolved through turbo's own task-graph `dependsOn` edges — see turbo.json).
      # Push: no since-SHA -> full suite. Diagnostics print what will run.
      - name: Determine affected scope
        id: scope
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.base_ref }}"
            git fetch --no-tags --quiet origin "+refs/heads/$base:refs/remotes/origin/$base"
            since="$(git merge-base "origin/$base" HEAD)"
            changed="$(git diff --name-only "$since" HEAD)"
            echo "Base: $base   since: $since"
            echo "Changed files:"; printf '%s\n' "$changed" | sed 's/^/  /'
            if [ -n "$changed" ] && ! printf '%s\n' "$changed" | grep -qvE '\.mdx?$'; then
              echo "→ docs-only: skipping typecheck + test."
              echo "skip=true" >> "$GITHUB_OUTPUT"
            elif printf '%s\n' "$changed" | grep -vE '\.mdx?$' | grep -qvE '^(packages|apps)/'; then
              # Root-impact guard: turbo maps files outside packages/apps (workflows, root
              # config, scripts/, e2e/, lockfile…) to NO package, so a filtered run would
              # select ZERO tasks and a broken CI/config change could merge green having
              # run nothing (found live on PR #315 — run 28623914417 executed 0 tasks for
              # a ci.yml-only diff). pnpm's #271 filter ran the FULL suite for root files;
              # restore that conservative semantic: no filter -> full run.
              echo "→ root-impact change (files outside packages/apps): running the FULL suite."
            else
              echo "since=$since" >> "$GITHUB_OUTPUT"
              echo "turbo's affected scope for '...[${since:0:9}]':"
              pnpm exec turbo run typecheck test --filter "...[$since]" --dry-run 2>&1 \
                | grep -E '^\s+•\s+(Packages in scope|Running)' | sed 's/^/  /' || true
            fi
          else
            echo "Push build — running the full suite."
          fi

      # pnpm audit (#218 security CI): now GATING at --audit-level=high. Flipped from the
      # non-blocking warn phase in #403, once the baseline was triaged — vitest bumped 2→3
      # (cleared the CVE-2026-47429 chain) and the dead prototype spike lockfiles removed. A
      # new high/critical advisory now reds the build; moderate/low are printed above for
      # visibility but do not gate. Gated on the same docs-only skip as the steps below (a
      # docs PR doesn't touch the lockfile); NOT affected-scope filtered — audit runs against
      # the single root lockfile, not turbo's per-package graph.
      #
      # Endpoint breakage (#477): npm retired the legacy audit endpoints (410 Gone;
      # pnpm/pnpm#11265) and the replacement /advisories/bulk client ships only in pnpm 11
      # (pnpm/pnpm#11268), not our pinned v10. So the audit command runs from pnpm 11, from a
      # probe dir holding only the lockfile: with the root package.json in scope, the nested
      # v11 would read `packageManager: pnpm@10.x` and delegate straight back to the broken
      # v10 client (manage-package-manager-versions). Same lockfile, same high+ gate — the
      # gate is NOT weakened. Note v11 no longer reads `pnpm.auditConfig` from package.json
      # (root allowlist: GHSA-67mh-4wv8-2f99, esbuild dev-server SSRF via drizzle-kit) — not
      # load-bearing for the gate: that advisory is moderate and only high+ gates. Fold the
      # allowlist into pnpm-workspace.yaml when the repo moves to pnpm 11.
      - name: 'pnpm audit (gate: high)'
        run: |
          if [ "${{ steps.scope.outputs.skip }}" = "true" ]; then echo "docs-only change — skipped"; exit 0; fi
          probe="$RUNNER_TEMP/audit-probe"
          mkdir -p "$probe"
          cp pnpm-lock.yaml "$probe/"
          echo '{"name":"audit-probe","private":true}' > "$probe/package.json"
          cd "$probe"
          echo "::group::pnpm audit (full — informational, all severities)"
          pnpm dlx pnpm@11.13.0 audit || true
          echo "::endgroup::"
          echo "Gating on high+ severity (moderate/low above are informational):"
          pnpm dlx pnpm@11.13.0 audit --audit-level=high

      # Lint + format gate (#267). Repo-wide (one root eslint.config.mjs), so unlike the
      # turbo step below it is NOT affected-filtered — and therefore needs the site's
      # generated artifacts (markdoc.blocks.generated.mjs + .astro types) regardless of
      # whether the PR touched the site; the prep line regenerates them (~1.4s).
      # Warnings are TOLERATED (no --max-warnings 0): the 36-warning baseline is the
      # react-hooks/React-Compiler set tracked in #338 (34) plus 2 in apps/admin/
      # test-browser/ (#293 — the same render-counting-harness pattern already used by
      # several apps/admin/test/ files, e.g. test/format-bubble.test.tsx) — flip to
      # zero-warnings when #338 lands.
      - name: Lint + format check
        # Raise the V8 old-space above the ~2GB runner default: `eslint .` runs
        # typescript-eslint's type-aware rules, which build a full TS program per tsconfig
        # across the whole monorepo. The vitest 3 upgrade (larger type surface — vite 8,
        # more @vitest/* d.ts) pushed the repo-wide run past 2GB and it OOM'd (SIGABRT/134).
        # Verified this is the type-program size itself, not the lib.dom leak fixed in #405:
        # eslint still exceeds 2GB with the leak gone. 4GB gives durable headroom.
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          if [ "${{ steps.scope.outputs.skip }}" = "true" ]; then echo "docs-only change — skipped"; exit 0; fi
          node scripts/gen-blocks.mjs && node scripts/gen-relations.mjs && pnpm --filter @setu/site exec astro sync
          pnpm lint
          pnpm format:check

      # Playwright's chromium browser, for apps/admin's real-browser component-test
      # project (#293 — apps/admin/test-browser/**, vitest.workspace.ts +
      # vitest.browser.config.ts). Deliberately installed HERE (in `check`, alongside
      # the rest of the unit-ish suite) rather than moved into the `e2e` job below:
      # these are component tests (single components/hooks mounted in isolation, no
      # app server, no journeys) — the "unit-ish tests live in the unit lane" split
      # stays true, and the browser only needs to be present, not re-verified against
      # a running app. Same cache key/version-resolution SHAPE as the e2e job's
      # "Cache Playwright browsers" step — but the keys are deliberately partitioned
      # (-chromium here vs -pr/-full there), so the two jobs restore/save independently;
      # each lane pays its own first-miss download, then hits its own cache thereafter.
      - name: Resolve Playwright version (admin browser tests)
        id: pw-admin
        working-directory: apps/admin
        run: |
          if [ "${{ steps.scope.outputs.skip }}" = "true" ]; then echo "version=skipped" >> "$GITHUB_OUTPUT"; exit 0; fi
          echo "version=$(node -p "require('playwright/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers (admin browser tests)
        if: steps.scope.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-admin.outputs.version }}-chromium

      - name: Install Playwright chromium (admin browser tests)
        run: |
          if [ "${{ steps.scope.outputs.skip }}" = "true" ]; then echo "docs-only change — skipped"; exit 0; fi
          pnpm --filter @setu/admin exec playwright install --with-deps chromium

      # @setu/core's typecheck also runs the edge build (tsconfig.edge.json), so the
      # edge-safe check is covered whenever core is in scope; push-to-main runs it regardless.
      # typecheck+test run as one turbo invocation per lane (readable, task-graph-ordered
      # log output — see turbo.json for the `dependsOn` graph this scope resolves through).
      # Remote cache via the adapter step above (#273): unchanged task hashes replay from
      # GitHub's cache across runs; changed code always misses and executes. apps/admin#test
      # is NOT cached by turbo (see turbo.json's admin#test override, #293) so this always
      # actually launches chromium — no stale-cache risk of silently skipping the browser
      # suite.
      - name: Typecheck + test (incl. core edge build)
        run: |
          if [ "${{ steps.scope.outputs.skip }}" = "true" ]; then echo "docs-only change — skipped"; exit 0; fi
          since='${{ steps.scope.outputs.since }}'
          if [ -n "$since" ]; then pnpm exec turbo run typecheck test --filter "...[$since]"; else pnpm exec turbo run typecheck test; fi

      # Lint: no linter is configured in the repo yet (#267). When it lands, add the step here.

      # Repo-script tests aren't a workspace package (not part of turbo's task graph);
      # run unless the change is docs-only.
      - name: Test (repo scripts)
        run: |
          if [ "${{ steps.scope.outputs.skip }}" = "true" ]; then echo "docs-only change — skipped"; exit 0; fi
          pnpm test:scripts

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Same draft-skip as `check` (#462).
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history for the docs-only check (merge-base diff, same as `check`).
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Docs-only PRs skip E2E, mirroring the `check` job's rule (kept inline in both
      # jobs deliberately — a shared job would couple the proven affected logic to this
      # one; revisit if a third consumer appears).
      - name: Determine scope
        id: scope
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.base_ref }}"
            git fetch --no-tags --quiet origin "+refs/heads/$base:refs/remotes/origin/$base"
            changed="$(git diff --name-only "$(git merge-base "origin/$base" HEAD)" HEAD)"
            if [ -n "$changed" ] && ! printf '%s\n' "$changed" | grep -qvE '\.mdx?$'; then
              echo "→ docs-only: skipping e2e."
              echo "skip=true" >> "$GITHUB_OUTPUT"
            fi
          fi
          # Full 3-browser matrix on push-to-main and the nightly cron; PR lane otherwise.
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "full=1" >> "$GITHUB_OUTPUT"
          fi

      # e2e/ is not a workspace package, so `pnpm -r typecheck` never covers it — gate it here.
      - name: Typecheck e2e
        run: |
          if [ "${{ steps.scope.outputs.skip }}" = "true" ]; then echo "docs-only change — skipped"; exit 0; fi
          pnpm exec tsc -p e2e --noEmit

      # Browser binaries are ~400MB; cache on the Playwright version. `--with-deps` system
      # libraries are NOT cached (apt) — install-deps runs even on cache hit, browsers don't.
      - name: Resolve Playwright version
        id: pw
        run: |
          if [ "${{ steps.scope.outputs.skip }}" = "true" ]; then echo "version=skipped" >> "$GITHUB_OUTPUT"; exit 0; fi
          echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        if: steps.scope.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}-${{ steps.scope.outputs.full && 'full' || 'pr' }}

      - name: Install Playwright browsers
        run: |
          if [ "${{ steps.scope.outputs.skip }}" = "true" ]; then echo "docs-only change — skipped"; exit 0; fi
          if [ "${{ steps.scope.outputs.full }}" = "1" ]; then
            pnpm exec playwright install --with-deps chromium webkit firefox
          else
            pnpm exec playwright install --with-deps chromium webkit
          fi

      # PR lane: chromium (all specs) + webkit (editor specs) + visual (chromium snapshots).
      # Push/nightly: E2E_FULL_MATRIX adds firefox-full + webkit-full over everything.
      - name: Run E2E
        run: |
          if [ "${{ steps.scope.outputs.skip }}" = "true" ]; then echo "docs-only change — skipped"; exit 0; fi
          if [ "${{ steps.scope.outputs.full }}" = "1" ]; then
            E2E_FULL_MATRIX=1 pnpm e2e
          else
            pnpm e2e
          fi

      # Traces, failure screenshots, and (on missing-baseline bootstrap) the visual
      # `*-actual.png` candidates all land in test-results — upload them for triage.
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            e2e/test-results/
            e2e/playwright-report/
          retention-days: 7
