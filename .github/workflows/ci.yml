name: CI

# Baseline quality gate — typecheck + tests.
#   * On a PR: only packages changed since the base branch AND their dependents run,
#     via pnpm's `...[<ref>]` affected filter (#271). A leaf-package PR runs 1 package;
#     a docs-only PR runs none (pnpm exits 0 on "no projects matched").
#   * On push to main: no filter → the FULL suite runs, as the post-merge safety net.
# Foundation: #217 · Affected filtering: #271 · CI epic: #216.

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same branch/PR so only the latest commit is checked.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so pnpm's affected filter can diff against the PR base branch.
          fetch-depth: 0

      # pnpm must be installed before setup-node so its `cache: pnpm` can find the store.
      # Version comes from the `packageManager` field in package.json.
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # On a PR, emit a pnpm selector scoping to packages changed since the base branch +
      # their dependents (`...[origin/<base>]`). On push to main, emit nothing → full suite.
      # The selector is emitted bare (not as `--filter=...`) so the run steps below can quote
      # it — the `[...]` would otherwise be exposed to bash globbing.
      - name: Determine affected scope
        id: scope
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.base_ref }}"
            git fetch --no-tags --quiet origin "+refs/heads/$base:refs/remotes/origin/$base"
            echo "Changed vs origin/$base:"
            git diff --name-only "origin/$base...HEAD" | sed 's/^/  /'
            echo "sel=...[origin/$base]" >> "$GITHUB_OUTPUT"
          else
            echo "Push build — running the full suite."
            echo "sel=" >> "$GITHUB_OUTPUT"
          fi

      # @setu/core's typecheck also runs the edge build (tsconfig.edge.json), so the
      # edge-safe check is covered whenever core is in scope. If core is unchanged it
      # can't have regressed; the full push-to-main run is the net.
      - name: Typecheck (incl. core edge build)
        run: |
          sel='${{ steps.scope.outputs.sel }}'
          if [ -n "$sel" ]; then pnpm --filter "$sel" -r typecheck; else pnpm -r typecheck; fi

      # Lint: no linter is configured in the repo yet (#267). When it lands, add the step here.

      - name: Test (workspace)
        run: |
          sel='${{ steps.scope.outputs.sel }}'
          if [ -n "$sel" ]; then pnpm --filter "$sel" -r test; else pnpm -r test; fi

      # Repo-script tests aren't a workspace package; always run (they're fast).
      - name: Test (repo scripts)
        run: pnpm test:scripts
