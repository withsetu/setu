name: CI

# Baseline quality gate — typecheck + tests on every PR and on pushes to main.
# Part of the CI epic (#216); this is the foundation (#217). Lint (no linter configured
# yet) and security/E2E/a11y layers land in follow-up children of the epic.

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same branch/PR so only the latest commit is checked.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm must be installed before setup-node so its `cache: pnpm` can find the store.
      # Version comes from the `packageManager` field in package.json (pnpm@10.33.0).
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `pnpm -r typecheck` runs each package's typecheck; @setu/core's also runs
      # `tsc -p tsconfig.edge.json --noEmit`, so the edge-safe build is covered here.
      - name: Typecheck (incl. core edge build)
        run: pnpm -r typecheck

      # Lint: no linter is configured in the repo yet. When one lands, add the step here.

      - name: Test (workspace)
        run: pnpm -r test

      - name: Test (repo scripts)
        run: pnpm test:scripts
