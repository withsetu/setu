name: Gitleaks

# Secret scanning (OWASP A08 Integrity / "secrets involved" line in
# docs/security-standards.md's pick-time checklist). Full-history scan on every PR and on
# push to main, so a leaked secret is caught the moment it lands, past or present.
#
# Why the gitleaks CLI directly and not `gitleaks/gitleaks-action`: gitleaks-action is a
# separately-licensed product — free for personal-account repos but it REQUIRES a paid
# GITLEAKS_LICENSE secret for organization-owned repos (see its README's "Do I need a
# free license key?" section). withsetu is a GitHub Organization (verified via
# `gh api orgs/withsetu`), so gitleaks-action would fail closed here without that secret.
# The underlying `gitleaks/gitleaks` scanner itself is MIT-licensed and free for anyone —
# this job runs that scanner's official container directly, no license needed.
# The digest-pinned image reference lives in .github/gitleaks/Dockerfile and is read from
# there by both this job and .githooks/pre-push, so the two can no longer drift and
# Dependabot has something it can actually parse (#817).
# Security CI foundation: #218 · CI epic: #216.

on:
  pull_request:
  push:
    branches: [main]

# Least-privilege GITHUB_TOKEN (#813): this job only reads the checkout and runs a
# container against it — nothing writes back. Declared at the top level so the job cannot
# inherit the repository/org default scope.
permissions:
  contents: read

concurrency:
  group: gitleaks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: gitleaks scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history — gitleaks needs every commit to catch secrets that were later removed.
          fetch-depth: 0

      - name: Run gitleaks
        run: |
          image="$(sed -n 's/^FROM  *//p' .github/gitleaks/Dockerfile | head -n 1)"
          if [ -z "$image" ]; then
            echo "::error::no FROM line in .github/gitleaks/Dockerfile — cannot resolve the gitleaks image."
            exit 1
          fi
          echo "gitleaks image: $image"
          docker run --rm -v "$PWD:/repo" "$image" git /repo --redact -v
